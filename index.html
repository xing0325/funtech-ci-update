<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="google" content="notranslate">
<title>CI UPDATE — FUNTECH BRAND IDENTITY</title>
<meta name="description" content="FunTech Brand Identity — 03 CI UPDATE (clone).">
<link rel="icon" href="favicon.ico">
<!-- elevon + proxima-nova (same Adobe Typekit kit the original uses) -->
<link rel="preconnect" href="https://use.typekit.net" crossorigin>
<link rel="stylesheet" href="https://use.typekit.net/pfl7wcw.css">
<!-- Zen Kaku Gothic Antique (JP/body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1C1D1E;
    --fg:#F2EEEB;
    --red:#FF481B;
    --rows:6;
    --pad:8px;
    --rail:200px;
    --bottom:52px;
    --disp:elevon, "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
    --ui:proxima-nova, "Helvetica Neue", Arial, sans-serif;
    --jp:"Zen Kaku Gothic Antique", var(--ui);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:var(--ui);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  a{color:inherit;text-decoration:none;}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}

  /* ---------- frame ---------- */
  .frame{
    position:fixed;inset:0;
    padding:var(--pad);
    display:grid;
    grid-template-columns:var(--rail) 1fr;
    grid-template-rows:1fr var(--bottom);
    gap:var(--pad);
    background:var(--bg);
  }

  /* ---------- left rail : thumbnail nav ---------- */
  .rail{
    grid-column:1;grid-row:1;
    position:relative;
    border:1px solid rgba(242,238,235,.14);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  .rail-head{
    padding:12px 14px 10px;
    border-bottom:1px solid rgba(242,238,235,.14);
    display:flex;align-items:center;justify-content:space-between;
    flex:0 0 auto;
  }
  .rail-head .mark{font-family:var(--disp);font-weight:900;font-size:15px;letter-spacing:.5px;}
  .rail-head .mark b{color:var(--red);}
  .rail-list{
    flex:1 1 auto;overflow:hidden;position:relative;
    padding:10px 0;
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 12%,#000 88%,transparent);
            mask-image:linear-gradient(180deg,transparent,#000 12%,#000 88%,transparent);
  }
  .rail-track{display:flex;flex-direction:column;gap:8px;padding:0 14px;will-change:transform;}
  .thumb{
    position:relative;display:block;flex:0 0 auto;
    border:1px solid rgba(242,238,235,.16);
    background:#000;overflow:hidden;transition:border-color .3s, transform .3s;
  }
  .thumb img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;opacity:.62;transition:opacity .3s, filter .3s;filter:grayscale(.3);}
  .thumb .cap{
    position:absolute;left:6px;bottom:5px;right:6px;
    font-family:var(--ui);font-weight:600;font-size:11px;letter-spacing:.4px;
    display:flex;gap:6px;align-items:baseline;text-shadow:0 1px 6px #000;
  }
  .thumb .cap .n{color:var(--red);font-family:var(--disp);}
  .thumb:hover img{opacity:.9;filter:none;}
  .thumb:hover{border-color:rgba(242,238,235,.45);}
  .thumb.active{border-color:var(--red);}
  .thumb.active img{opacity:1;filter:none;}
  .thumb.active::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 2px var(--red);pointer-events:none;}

  /* ---------- stage ---------- */
  .stage{
    grid-column:2;grid-row:1;
    position:relative;overflow:hidden;
    container-type:size;
    background:var(--bg);
    border:1px solid rgba(242,238,235,.14);
  }
  .layer{position:absolute;inset:0;pointer-events:none;}

  /* marquee wall */
  .marquee{
    display:flex;flex-direction:column;justify-content:center;
    overflow:hidden;z-index:1;
  }
  .mq-row{
    flex:0 0 auto;height:1em;line-height:1;overflow:hidden;white-space:nowrap;
    font-family:var(--disp);font-weight:900;color:var(--red);
    font-size:clamp(96px, max(22cqw, calc(100cqh / var(--rows))), 360px);
  }
  .mq-track{display:inline-flex;width:max-content;will-change:transform;animation:mq-l var(--dur,34s) linear infinite;}
  .mq-row:nth-child(even) .mq-track{animation-name:mq-r;}
  .mq-track span{padding-right:.12em;}
  @keyframes mq-l{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes mq-r{from{transform:translateX(-50%)}to{transform:translateX(0)}}

  /* diagonal stripes */
  .stripes{
    z-index:2;opacity:.5;mix-blend-mode:multiply;
    background:repeating-linear-gradient(-135deg,
      rgba(0,0,0,0) 0, rgba(0,0,0,0) 7px,
      rgba(0,0,0,.16) 7px, rgba(0,0,0,.16) 8px);
  }
  /* vignette */
  .vignette{
    z-index:3;
    background:radial-gradient(ellipse 78% 70% at 50% 46%,
      rgba(28,29,30,0) 40%, rgba(28,29,30,.55) 78%, rgba(28,29,30,.9) 100%);
  }
  /* grain noise */
  #noise{
    position:absolute;inset:0;width:100%;height:100%;
    z-index:4;opacity:.14;mix-blend-mode:screen;pointer-events:none;
    image-rendering:pixelated;
  }
  /* animated noise border */
  .noise-border{z-index:5;}
  .noise-border::before,.noise-border::after{
    content:"";position:absolute;inset:0;
    border:1.5px solid var(--red);opacity:.55;
    -webkit-mask:repeating-linear-gradient(90deg,#000 0 6px,transparent 6px 12px);
            mask:repeating-linear-gradient(90deg,#000 0 6px,transparent 6px 12px);
    animation:nb-h 1.1s steps(6) infinite;
  }
  .noise-border::after{
    -webkit-mask:repeating-linear-gradient(0deg,#000 0 6px,transparent 6px 12px);
            mask:repeating-linear-gradient(0deg,#000 0 6px,transparent 6px 12px);
    animation-name:nb-v;
  }
  @keyframes nb-h{to{-webkit-mask-position:12px 0;mask-position:12px 0;}}
  @keyframes nb-v{to{-webkit-mask-position:0 12px;mask-position:0 12px;}}

  /* headline */
  .headline{z-index:6;font-family:var(--disp);font-weight:900;color:var(--fg);}
  .headline .w{
    position:absolute;line-height:.9;letter-spacing:.5px;
    font-size:clamp(32px, 6.2cqw, 80px);
    text-shadow:0 3px 26px rgba(0,0,0,.6), 0 0 2px rgba(0,0,0,.4);
    opacity:0;transform:translateY(26px);
    animation:rise .9s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes rise{to{opacity:1;transform:none;}}
  .w.w1{left:6%; top:7%;  animation-delay:.15s;}
  .w.w2{left:70%;top:24%; animation-delay:.35s;}
  .w.w3{left:15%;top:52%; animation-delay:.55s;}
  .w.w4{left:57%;top:68%; animation-delay:.75s;}

  /* ---------- HUD ---------- */
  .hud{position:absolute;z-index:8;pointer-events:auto;}
  .hud-tl{top:12px;left:14px;display:flex;align-items:center;gap:10px;}
  .odo{font-family:var(--disp);font-weight:400;color:var(--red);font-size:15px;letter-spacing:1px;display:inline-flex;}
  .od-reel{display:inline-block;height:1em;overflow:hidden;vertical-align:bottom;}
  .od-inner{display:flex;flex-direction:column;transition:transform 1.15s cubic-bezier(.16,1,.3,1);}
  .od-d{height:1em;line-height:1;text-align:center;}
  .od-s{display:inline-block;}
  .hud-tl .lbl{font-family:var(--ui);font-weight:600;font-size:12px;letter-spacing:1.4px;color:var(--fg);}
  .gear{width:15px;height:15px;color:var(--red);animation:spin 7s linear infinite;transform-origin:50% 50%;}

  .hud-tr{top:12px;right:14px;display:flex;align-items:center;gap:8px;}
  .emo{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:16px;
       border:1px solid rgba(242,238,235,.16);transition:transform .25s, border-color .25s, background .25s;}
  .emo:hover{transform:translateY(-2px) scale(1.12);border-color:var(--red);background:rgba(255,72,27,.1);}
  .emo:active{transform:scale(.92);}
  .emo.on{background:var(--red);border-color:var(--red);}
  .snd{display:flex;align-items:flex-end;gap:2px;height:16px;padding:0 6px;}
  .snd i{width:2px;background:var(--fg);height:6px;border-radius:1px;animation:sbar 1s ease-in-out infinite;}
  .snd i:nth-child(2){animation-delay:.15s}.snd i:nth-child(3){animation-delay:.3s}.snd i:nth-child(4){animation-delay:.45s}
  .snd.off i{animation-play-state:paused;height:4px;opacity:.4;}
  @keyframes sbar{0%,100%{height:4px}50%{height:15px}}
  .menu-btn{font-family:var(--ui);font-weight:700;font-size:12px;letter-spacing:2px;padding:8px 12px;border:1px solid rgba(242,238,235,.2);transition:.25s;}
  .menu-btn:hover{border-color:var(--red);color:var(--red);}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- bottom bar ---------- */
  .bottom{
    grid-column:1/3;grid-row:2;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:0 4px;font-family:var(--ui);
  }
  .nav-lnk{display:flex;align-items:center;gap:9px;padding:6px 10px;transition:.25s;flex:0 0 auto;}
  .nav-lnk .ar{color:var(--red);font-family:var(--disp);font-size:17px;line-height:1;transition:transform .25s;}
  .nav-lnk .num{color:var(--red);font-family:var(--disp);font-weight:900;font-size:14px;}
  .nav-lnk .tt{font-weight:600;font-size:13px;letter-spacing:.6px;}
  .nav-lnk .sub{font-size:9px;letter-spacing:1.5px;opacity:.5;display:block;}
  .nav-lnk:hover{color:var(--red);}
  .nav-lnk.prev:hover .ar{transform:translateX(-4px);}
  .nav-lnk.next:hover .ar{transform:translateX(4px);}
  .meta{display:flex;align-items:center;gap:18px;font-weight:600;font-size:11px;letter-spacing:1px;flex-wrap:wrap;justify-content:center;}
  .meta a{opacity:.72;transition:.2s;position:relative;}
  .meta a:hover{opacity:1;color:var(--red);}
  .meta .sep{opacity:.25;}
  .lang b{color:var(--red);} .lang{opacity:.72;}

  /* ---------- menu overlay ---------- */
  .overlay{
    position:fixed;inset:0;z-index:40;background:rgba(20,21,22,.97);
    padding:clamp(16px,4vw,54px);
    display:flex;flex-direction:column;
    opacity:0;visibility:hidden;transition:opacity .4s;
  }
  .overlay.open{opacity:1;visibility:visible;}
  .ov-bg{position:absolute;inset:0;overflow:hidden;opacity:.05;z-index:0;display:flex;flex-direction:column;justify-content:center;pointer-events:none;}
  .ov-bg .mq-row{color:var(--red);}
  .ov-head{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;margin-bottom:clamp(14px,3vh,34px);}
  .ov-head .t{font-family:var(--disp);font-weight:900;font-size:clamp(20px,3vw,34px);}
  .ov-head .t b{color:var(--red);}
  .ov-close{font-family:var(--ui);font-weight:700;font-size:13px;letter-spacing:2px;border:1px solid rgba(242,238,235,.3);padding:9px 16px;transition:.25s;}
  .ov-close:hover{border-color:var(--red);color:var(--red);}
  .ov-grid{
    position:relative;z-index:1;flex:1;overflow-y:auto;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:clamp(10px,1.4vw,18px);align-content:start;
  }
  .ov-item{position:relative;border:1px solid rgba(242,238,235,.16);overflow:hidden;background:#000;transition:.3s;}
  .ov-item img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;opacity:.66;transition:.3s;filter:grayscale(.25);}
  .ov-item .cap{position:absolute;left:9px;bottom:8px;right:9px;display:flex;gap:8px;align-items:baseline;font-weight:600;font-size:12px;letter-spacing:.5px;text-shadow:0 1px 8px #000;}
  .ov-item .cap .n{color:var(--red);font-family:var(--disp);font-weight:900;}
  .ov-item:hover{border-color:var(--red);transform:translateY(-3px);}
  .ov-item:hover img{opacity:1;filter:none;}
  .ov-item.active{border-color:var(--red);}
  .ov-item.active img{opacity:1;filter:none;}
  .ov-item.active::after{content:"NOW";position:absolute;top:7px;right:7px;font-family:var(--disp);font-weight:900;font-size:10px;letter-spacing:1px;color:#fff;background:var(--red);padding:2px 6px;}

  /* toast (cross-page nav stays inside the clone) */
  .toast{
    position:fixed;left:50%;bottom:76px;transform:translate(-50%,16px);z-index:60;
    background:rgba(18,19,20,.96);border:1px solid var(--red);color:var(--fg);
    font-family:var(--ui);font-weight:600;font-size:12px;letter-spacing:.4px;
    padding:11px 18px;box-shadow:0 8px 30px rgba(0,0,0,.55);
    opacity:0;transition:opacity .35s, transform .35s;pointer-events:none;max-width:90vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);}

  /* ---------- responsive ---------- */
  @media (max-width:820px){
    :root{--rail:0px;--bottom:66px;}
    .frame{grid-template-columns:1fr;grid-template-rows:1fr var(--bottom);}
    .rail{display:none;}
    .stage{grid-column:1;}
    .bottom{grid-column:1;flex-direction:column;gap:6px;padding:6px 4px;justify-content:center;}
    .meta{gap:12px;font-size:10px;}
    .w.w1{top:9%}.w.w2{left:52%;top:26%}.w.w3{left:8%;top:50%}.w.w4{left:46%;top:70%}
    .hud-tr .menu-btn{padding:7px 9px;}
  }
  @media (max-width:520px){
    .headline .w{font-size:clamp(26px,10vw,52px);}
    .hud-tr{gap:5px;} .emo{width:26px;height:26px;font-size:14px;}
    .nav-lnk .tt{font-size:11px;}
  }
  @media (prefers-reduced-motion:reduce){
    .mq-track,.gear,.snd i,.noise-border::before,.noise-border::after{animation:none !important;}
    .headline .w{animation:none;opacity:1;transform:none;}
  }
  /* static mode (?freeze) — pause everything for screenshots */
  html.is-frozen *,html.is-frozen *::before,html.is-frozen *::after{animation-play-state:paused !important;}
  html.is-frozen .headline .w{opacity:1 !important;transform:none !important;}
</style>
</head>
<body>

<script>
(function(){
  "use strict";

  // deck data (order = slide number)
  var PAGES = [
    ["home","HOME"],["brand-message","BRAND MESSAGE"],["ci-update","CI UPDATE"],
    ["vision-visual","VISION VISUAL"],["funtech-way","FUNTECH WAY"],
    ["megavolt-creative","A MILLION-VOLT CREATIVE"],["breakers-of-victory","BREAKERS OF VICTORY"],
    ["all-for-fun","ALL FOR FUN"],["logo-details","LOGO DETAILS"],["logo-variation","LOGO VARIATION"],
    ["10th-special-item","10th SPECIAL ITEM"],["ending-message","ENDING MESSAGE"],
    ["we-are-funtech","WE ARE FUNTECH"],["fin","FIN"]
  ];
  var CURRENT = 2; // 0-based → slide 03
  var SITE = "https://ci.funtech.inc/en/";
  var pad2 = function(n){return (n<10?"0":"")+n;};

  // static mode: ?freeze pauses everything (screenshots / reduced-motion)
  if(/[?&]freeze/.test(location.search)){ window.__freeze = true; document.documentElement.classList.add('is-frozen'); }

  // ---------- marquee wall ----------
  var stage = document.getElementById('stage');
  var marquee = document.getElementById('marquee');
  function buildMarquee(host, rows, wordsPerHalf){
    host.style.setProperty('--rows', rows);
    host.innerHTML = '';
    var half = new Array(wordsPerHalf).fill('CIUPDATE').map(function(w){return '<span>'+w+'</span>';}).join('');
    for(var r=0;r<rows;r++){
      var row = document.createElement('div'); row.className='mq-row';
      var track = document.createElement('div'); track.className='mq-track';
      track.innerHTML = half+half;                    // two identical halves → seamless -50%
      track.style.setProperty('--dur', (26 + r*4)+'s'); // vary speed per row
      track.style.animationDelay = (-(r*4.3 + 1.5)).toFixed(1)+'s'; // desync rows (phase offset)
      row.appendChild(track); host.appendChild(row);
    }
  }
  buildMarquee(marquee, 6, 3);   // 3 words/half ≈ original 7240px track; seamless -50% loop

  // faint marquee behind the menu overlay (kept light — decorative, 0.05 opacity)
  buildMarquee(document.getElementById('ovBg'), 4, 3);

  // ---------- grain noise ----------
  var cv = document.getElementById('noise');
  var ctx = cv.getContext('2d');
  cv.width = 220; cv.height = 132;
  var buf = ctx.createImageData(cv.width, cv.height);
  var last = 0;
  function grain(t){
    if(window.__freeze) return;        // hard stop (static mode / screenshots)
    requestAnimationFrame(grain);
    if(document.hidden) return;
    if(t - last < 66) return;          // ~15fps
    last = t;
    var d = buf.data;
    for(var i=0;i<d.length;i+=4){
      var v = (Math.random()*255)|0;
      d[i]=255; d[i+1]=72+(v*0.3|0); d[i+2]=27+(v*0.15|0); d[i+3]=v;
    }
    ctx.putImageData(buf,0,0);
  }
  requestAnimationFrame(grain);

  // ---------- odometer ----------
  function odometer(host, str, baseDelay){
    host.innerHTML='';
    var reels=[];
    str.split('').forEach(function(ch){
      if(ch<'0'||ch>'9'){
        var s=document.createElement('span'); s.className='od-s'; s.textContent=ch; host.appendChild(s); return;
      }
      var reel=document.createElement('span'); reel.className='od-reel';
      var inner=document.createElement('span'); inner.className='od-inner';
      for(var d=0;d<=9;d++){var dd=document.createElement('span'); dd.className='od-d'; dd.textContent=d; inner.appendChild(dd);}
      reel.appendChild(inner); host.appendChild(reel);
      reels.push([inner, parseInt(ch,10)]);
    });
    requestAnimationFrame(function(){
      reels.forEach(function(pair,i){
        if(window.__freeze){ pair[0].style.transition='none'; pair[0].style.transform='translateY(-'+pair[1]+'em)'; return; }
        setTimeout(function(){ pair[0].style.transform='translateY(-'+pair[1]+'em)'; }, (baseDelay||150)+i*140);
      });
    });
  }
  odometer(document.getElementById('odoMain'), pad2(CURRENT+1)+'.', 350);

  // ---------- rail thumbnails ----------
  var railTrack = document.getElementById('railTrack');
  PAGES.forEach(function(p,i){
    var a=document.createElement('a');
    a.className='thumb'+(i===CURRENT?' active':' xpage');
    a.href='#'; a.dataset.slide=p[0];
    a.innerHTML='<img loading="lazy" src="thumbnails/'+p[0]+'.webp" alt="'+p[1]+'">'
      +'<span class="cap"><span class="n">'+pad2(i+1)+'</span>'+p[1]+'</span>';
    railTrack.appendChild(a);
  });
  // center the current thumbnail in the rail
  requestAnimationFrame(function(){
    var active=railTrack.querySelector('.thumb.active');
    var list=railTrack.parentElement;
    if(active){
      var off = active.offsetTop - (list.clientHeight/2 - active.offsetHeight/2);
      railTrack.style.transform='translateY('+(-Math.max(0,off))+'px)';
      railTrack.style.transition='transform 1s cubic-bezier(.16,1,.3,1)';
    }
  });

  // ---------- menu overlay ----------
  var overlay=document.getElementById('overlay');
  var ovGrid=document.getElementById('ovGrid');
  PAGES.forEach(function(p,i){
    var a=document.createElement('a');
    a.className='ov-item'+(i===CURRENT?' active':' xpage');
    a.href='#'; a.dataset.slide=p[0];
    a.innerHTML='<img loading="lazy" src="thumbnails/'+p[0]+'.webp" alt="'+p[1]+'">'
      +'<span class="cap"><span class="n">'+pad2(i+1)+'</span>'+p[1]+'</span>';
    ovGrid.appendChild(a);
  });
  function setMenu(open){
    overlay.classList.toggle('open',open);
    overlay.setAttribute('aria-hidden', open?'false':'true');
  }
  document.getElementById('menuOpen').addEventListener('click',function(){setMenu(true);});
  document.getElementById('menuClose').addEventListener('click',function(){setMenu(false);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')setMenu(false);});
  overlay.addEventListener('click',function(e){if(e.target===overlay)setMenu(false);});

  // cross-page nav (prev/next/rail/menu → sibling slides) stays INSIDE the clone —
  // those pages live in other parallel sessions, so we don't yank the user to the live site.
  var toastEl, toastTimer;
  function toast(msg){
    if(toastEl) toastEl.remove();
    toastEl=document.createElement('div'); toastEl.className='toast'; toastEl.textContent=msg;
    document.body.appendChild(toastEl);
    requestAnimationFrame(function(){ toastEl.classList.add('show'); });
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){ if(toastEl){ toastEl.classList.remove('show'); } },2800);
  }
  document.addEventListener('click',function(e){
    var a=e.target.closest ? e.target.closest('a.xpage') : null;
    if(!a) return;
    e.preventDefault();
    setMenu(false);
    var slide=(a.dataset.slide||'').replace(/-/g,' ').toUpperCase();
    toast('这是第 3 页(CI UPDATE)独立克隆 · '+(slide?slide+' ':'其他页')+'由别的 session 负责');
  });

  // ---------- emoji + sound toggles ----------
  document.querySelectorAll('.emo').forEach(function(b){
    b.addEventListener('click',function(){
      b.classList.toggle('on');
      if(b.dataset.fx==='party') burst(b);
    });
  });
  var snd=document.getElementById('snd');
  snd.addEventListener('click',function(){snd.classList.toggle('off');});

  // tiny confetti burst for 🎉 (pure DOM, no deps)
  function burst(from){
    var r=from.getBoundingClientRect();
    var cols=['#FF481B','#F2EEEB','#ffd23f','#3ad1ff'];
    for(var i=0;i<16;i++){
      var s=document.createElement('span');
      s.textContent=['⚡','★','●','▲'][i%4];
      s.style.cssText='position:fixed;z-index:60;pointer-events:none;font-size:'+(9+Math.random()*10)+'px;color:'+cols[i%4]
        +';left:'+(r.left+r.width/2)+'px;top:'+(r.top+r.height/2)+'px;transition:transform 1s cubic-bezier(.1,.7,.3,1),opacity 1s;';
      document.body.appendChild(s);
      (function(el){
        requestAnimationFrame(function(){
          var a=Math.random()*Math.PI*2, dist=60+Math.random()*120;
          el.style.transform='translate('+Math.cos(a)*dist+'px,'+Math.sin(a)*dist+'px) rotate('+(Math.random()*720-360)+'deg)';
          el.style.opacity='0';
        });
        setTimeout(function(){el.remove();},1050);
      })(s);
    }
  }
})();
</script>
</body>
</html>
